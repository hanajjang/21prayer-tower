<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>21일 조건기도 모래성</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f3f0 0%, #f9f5f2 100%);
            color: #333;
        }
        
        .app-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem;
            min-height: 100vh;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 0.5rem 0;
        }
        
        .collapse-counter {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(239, 68, 68, 0.1);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #dc2626;
        }
        
        .today-date {
            text-align: center;
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }
        
        .dday {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(59, 130, 246, 0.1);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #1e40af;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin: 2rem 0;
        }
        
        .game-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .game-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
        }
        
        .nav-button {
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        
        .nav-button:hover:not(:disabled) {
            background: #dbeafe;
            border-color: #3b82f6;
            color: #1e40af;
            transform: scale(1.1);
        }
        
        .nav-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .game-canvas {
            background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 50%, #f4e4c1 100%);
            border-radius: 16px;
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .canvas-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .day-label {
            display: none;
        }
        
        .save-status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 11px;
            color: #666;
            background: rgba(255,255,255,0.8);
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .progress-section {
            margin: 0;
        }
        
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #fbbf24 0%, #f59e0b 100%);
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .right-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .prayer-section {
            background: #f9fafb;
            border-radius: 12px;
            padding: 1rem;
        }
        
        .prayer-title {
            font-size: 13px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 0.8rem;
        }
        
        .prayer-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .prayer-item {
            background: white;
            border: 0.5px solid #e5e7eb;
            border-radius: 6px;
            padding: 8px;
            font-size: 11px;
            line-height: 1.5;
            color: #666;
        }
        
        .prayer-item-title {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 2px;
            font-size: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .stat-card {
            background: #f9fafb;
            border-radius: 8px;
            padding: 0.8rem;
            text-align: center;
        }
        
        .stat-number {
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 2px;
        }
        
        .stat-label {
            font-size: 11px;
            color: #666;
            font-weight: 500;
        }
        
        .participants-section {
            background: #f9fafb;
            border-radius: 12px;
            padding: 1rem;
        }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 0.8rem;
        }
        
        .participants-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        
        .participant-card {
            background: white;
            border: 0.5px solid #e5e7eb;
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            user-select: none;
        }
        
        .participant-card:hover:not(.disabled) {
            transform: translateY(-2px);
            border-color: #bfdbfe;
            background: #f0f9ff;
        }
        
        .participant-card.completed {
            background: rgba(74, 222, 128, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
        }
        
        .participant-card.disabled {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .participant-name {
            font-size: 11px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 3px;
        }
        
        .participant-status {
            font-size: 9px;
            font-weight: 500;
        }
        
        .completed .participant-status {
            color: #22c55e;
        }
        
        .pending .participant-status {
            color: #666;
        }
        
        .completed-time {
            font-size: 8px;
            color: #16a34a;
            margin-top: 2px;
            font-weight: 600;
        }
        
        .notification {
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            animation: slideUp 0.4s ease;
            margin-top: 1rem;
        }
        
        .notification.success {
            background: rgba(74, 222, 128, 0.15);
            color: #16a34a;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        
        .notification.collapse {
            background: rgba(239, 68, 68, 0.15);
            color: #dc2626;
            border: 1px solid rgba(220, 38, 38, 0.3);
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 1000px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .participants-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="collapse-counter">
                <span>⚠️무너짐</span>
                <span id="collapseCount">0</span>
            </div>
            
            <div class="today-date" id="todayDate">
                2026년 3월 23일
            </div>
            
            <div class="dday">
                <span>D + <span id="ddayNumber">0</span></span>
            </div>
        </div>
        
        <div class="main-content">
            <div class="game-section">
                <div class="game-controls">
                    <button class="nav-button" id="prevBtn" onclick="previousDay()">←</button>
                    <div class="game-canvas">
                        <div class="canvas-content">
                            <svg id="castleSvg" viewBox="0 0 500 300" preserveAspectRatio="xMidYMid meet">
                                <defs>
                                    <linearGradient id="tower.png" x1="0%" y1="0%" x2="0%" y2="100%">
                                        <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
                                        <stop offset="100%" style="stop-color:#8B7355;stop-opacity:1" />
                                    </linearGradient>
                                </defs>
                                
                                <rect width="500" height="150" fill="#87CEEB"/>
                                <ellipse cx="250" cy="280" rx="250" ry="40" fill="#F4A460" opacity="0.3"/>
                                
                                <g id="castleBlocks">
                                    <rect x="100" y="260" width="300" height="20" fill="url(#sandGradient)" stroke="#8B7355" stroke-width="1"/>
                                    <rect x="120" y="240" width="260" height="20" fill="url(#sandGradient)" stroke="#8B7355" stroke-width="1"/>
                                    <rect x="140" y="220" width="220" height="20" fill="url(#sandGradient)" stroke="#8B7355" stroke-width="1"/>
                                    <rect x="160" y="200" width="180" height="20" fill="url(#sandGradient)" stroke="#8B7355" stroke-width="1"/>
                                    <rect x="180" y="180" width="140" height="20" fill="url(#sandGradient)" stroke="#8B7355" stroke-width="1"/>
                                    <rect x="200" y="160" width="100" height="20" fill="url(#sandGradient)" stroke="#8B7355" stroke-width="1"/>
                                    <rect x="220" y="140" width="60" height="20" fill="url(#sandGradient)" stroke="#8B7355" stroke-width="1"/>
                                    <rect x="230" y="120" width="40" height="20" fill="url(#sandGradient)" stroke="#8B7355" stroke-width="1"/>
                                    <rect x="235" y="100" width="30" height="20" fill="url(#sandGradient)" stroke="#8B7355" stroke-width="1"/>
                                    <rect x="240" y="80" width="20" height="20" fill="url(#sandGradient)" stroke="#8B7355" stroke-width="1"/>
                                    <rect x="235" y="60" width="30" height="20" fill="url(#sandGradient)" stroke="#8B7355" stroke-width="1"/>
                                    <rect x="240" y="40" width="20" height="20" fill="url(#sandGradient)" stroke="#8B7355" stroke-width="1"/>
                                    <line x1="250" y1="40" x2="250" y2="0" stroke="#8B4513" stroke-width="3"/>
                                    <polygon points="250,0 270,10 265,20" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>
                                </g>
                            </svg>
                            <div class="day-label" id="dayLabel">D+0</div>
                            <div class="save-status" id="saveStatus">로딩중...</div>
                        </div>
                    </div>
                    <button class="nav-button" id="nextBtn" onclick="nextDay()" disabled>→</button>
                </div>
                
                <div class="progress-section">
                    <div class="progress-label">
                        <span>모래성 완성도</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            
            <div class="right-section">
                <div class="prayer-section">
                    <div class="prayer-title">📿 기도제목</div>
                    <div class="prayer-list">
                        <div class="prayer-item">
                            <div class="prayer-item-title">1️⃣ 선생님을 위한 기도</div>
                            <div>6월 전까지 재판을 위해</div>
                        </div>
                        <div class="prayer-item">
                            <div class="prayer-item-title">2️⃣ 청미부서를 위한 기도</div>
                            <div>팀원, 생명기도, 주의 뜻</div>
                        </div>
                        <div class="prayer-item">
                            <div class="prayer-item-title">3️⃣ 나의 사명과 차원</div>
                            <div>사명과 차원을 높이기 위해</div>
                        </div>
                        <div class="prayer-item">
                            <div class="prayer-item-title">4️⃣ 감사, 회개 등</div>
                            <div>감사와 회개의 기도</div>
                        </div>
                    </div>
                </div>
                
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="completedCount">0</div>
                        <div class="stat-label">완료</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="pendingCount">12</div>
                        <div class="stat-label">진행중</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="successRate">0%</div>
                        <div class="stat-label">성공률</div>
                    </div>
                </div>
                
                <div class="participants-section">
                    <div class="section-title">오늘의 참가자</div>
                    <div class="participants-grid" id="participantsList"></div>
                </div>
            </div>
        </div>
        
        <div id="notificationArea"></div>
    </div>

    <script>
        // 🔑 Google Apps Script 배포 URL (여기에 입력!)
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/d/AKfycbwQiVxWkrjbQGwPutCwBNkH_WIWbroB8WN1PP-7UtMOTiSbyqOb5f0aJ8MItDRjq2Fdcg/userweb';
        
        let gameState = {
            currentDay: 0,
            viewingDay: 0,
            castleHeight: 0,
            lastResetTime: new Date(),
            participants: [
                { name: '정지양', completed: false, completedTime: null },
                { name: '이누리', completed: false, completedTime: null },
                { name: '이나영', completed: false, completedTime: null },
                { name: '김지윤', completed: false, completedTime: null },
                { name: '주손하나', completed: false, completedTime: null },
                { name: '김예람', completed: false, completedTime: null },
                { name: '김효진', completed: false, completedTime: null },
                { name: '이태령', completed: false, completedTime: null },
                { name: '최수아', completed: false, completedTime: null },
                { name: '진현주', completed: false, completedTime: null },
                { name: '최다영', completed: false, completedTime: null },
                { name: '성유나', completed: false, completedTime: null }
            ],
            collapseCount: 0,
            maxHeight: 21,
            castleHistory: [0]
        };
        
        function getCurrentTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            return `${hours}:${minutes}`;
        }
        
        function formatDate() {
            const date = new Date();
            return `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일`;
        }
        
        // 📥 Google Sheets에서 데이터 불러오기
        async function loadGameData() {
            try {
                updateSaveStatus('로딩중...');
                
                const gameRes = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getGame' })
                });
                
                const gameData = await gameRes.json();
                if (gameData.currentDay !== undefined) {
                    gameState.currentDay = gameData.currentDay;
                    gameState.collapseCount = gameData.collapseCount;
                    gameState.castleHistory = gameData.castleHistory || [0];
                }
                
                const partRes = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getParticipants' })
                });
                
                const participants = await partRes.json();
                if (participants && participants.length > 0) {
                    gameState.participants = participants;
                }
                
                updateSaveStatus('로드됨 ✓');
                updateUI();
            } catch(err) {
                console.log('데이터 로드 실패:', err);
                updateSaveStatus('오프라인');
                updateUI();
            }
        }
        
        // 📤 Google Sheets에 데이터 저장
        async function saveGameData() {
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'saveGame',
                        currentDay: gameState.currentDay,
                        collapseCount: gameState.collapseCount,
                        castleHistory: gameState.castleHistory
                    })
                });
                
                updateSaveStatus('저장됨 ✓');
            } catch(err) {
                console.log('저장 실패:', err);
                updateSaveStatus('저장 실패');
            }
        }
        
        async function saveParticipants() {
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'saveParticipants',
                        participants: gameState.participants
                    })
                });
            } catch(err) {
                console.log('참가자 저장 실패:', err);
            }
        }
        
        function updateSaveStatus(text) {
            const status = document.getElementById('saveStatus');
            if (status) {
                status.textContent = text;
            }
        }
        
        function previousDay() {
            if (gameState.viewingDay > 0) {
                gameState.viewingDay--;
                updateUI();
            }
        }
        
        function nextDay() {
            if (gameState.viewingDay < gameState.currentDay) {
                gameState.viewingDay++;
                updateUI();
            }
        }
        
        function toggleParticipant(index) {
            if (gameState.viewingDay !== gameState.currentDay) return;
            
            const p = gameState.participants[index];
            if (!p.completed) {
                p.completed = true;
                p.completedTime = getCurrentTime();
                
                saveParticipants();
                updateUI();
                
                if (gameState.participants.every(p => p.completed)) {
                    completeDay();
                }
            }
        }
        
        function checkAndResetDay() {
            const now = new Date();
            const timeDiff = now - gameState.lastResetTime;
            const minutesPassed = timeDiff / (1000 * 60);
            
            if (minutesPassed >= 1) {
                const allCompleted = gameState.participants.every(p => p.completed);
                
                if (allCompleted) {
                    autoCompleteDay();
                } else {
                    autoCollapseDay();
                }
                
                gameState.lastResetTime = new Date();
            }
        }
        
        function autoCompleteDay() {
            if (gameState.currentDay < gameState.maxHeight) {
                gameState.currentDay++;
                gameState.viewingDay = gameState.currentDay;
                gameState.castleHeight = gameState.currentDay;
                gameState.castleHistory.push(gameState.currentDay);
                
                gameState.participants.forEach(p => {
                    p.completed = false;
                    p.completedTime = null;
                });
                
                const notification = document.getElementById('notificationArea');
                notification.innerHTML = `
                    <div class="notification success">
                        🎉 모두 완료! 모래성이 한층 높아졌습니다! (${gameState.currentDay}/21)
                    </div>
                `;
                
                setTimeout(() => notification.innerHTML = '', 5000);
                
                saveGameData();
                saveParticipants();
                updateUI();
            }
        }
        
        function autoCollapseDay() {
            gameState.collapseCount++;
            gameState.currentDay = 0;
            gameState.viewingDay = 0;
            gameState.castleHeight = 0;
            gameState.castleHistory = [0];
            
            gameState.participants.forEach(p => {
                p.completed = false;
                p.completedTime = null;
            });
            
            const notification = document.getElementById('notificationArea');
            notification.innerHTML = `
                <div class="notification collapse">
                    ⚠️ 조건 미충족! 모래성이 무너졌습니다...<br/>
                    <span style="font-size: 12px;">D+1로 리셋됩니다. 화이팅! 💪</span>
                </div>
            `;
            
            setTimeout(() => notification.innerHTML = '', 5000);
            
            saveGameData();
            saveParticipants();
            updateUI();
        }
        
        function completeDay() {
            const notification = document.getElementById('notificationArea');
            notification.innerHTML = `
                <div class="notification success">
                    ✅ 오늘 모두 완료했습니다!<br/>
                    <span style="font-size: 12px;">1분 후 자동으로 진행됩니다.</span>
                </div>
            `;
            
            setTimeout(() => notification.innerHTML = '', 5000);
        }
        
        function updateCastleImage() {
            const castleBlocks = document.getElementById('castleBlocks');
            if (!castleBlocks) return;
            
            let displayHeight;
            if (gameState.viewingDay === gameState.currentDay) {
                const completed = gameState.participants.filter(p => p.completed).length;
                gameState.castleHeight = gameState.currentDay + (completed / 12);
                displayHeight = gameState.castleHeight;
            } else {
                displayHeight = gameState.castleHistory[gameState.viewingDay] || 0;
            }
            
            const blockElements = castleBlocks.querySelectorAll('rect[y]');
            const flagAndPole = castleBlocks.querySelectorAll('line, polygon');
            
            const totalBlocks = 12;
            const blocksToShow = Math.ceil((displayHeight / gameState.maxHeight) * totalBlocks);
            
            blockElements.forEach((block, index) => {
                block.style.opacity = index < blocksToShow ? '1' : '0';
            });
            
            flagAndPole.forEach(element => {
                element.style.opacity = blocksToShow > 0 ? '1' : '0';
            });
        }
        
        function updateUI() {
            const completed = gameState.participants.filter(p => p.completed).length;
            const total = gameState.participants.length;
            const percent = Math.round((completed / total) * 100);
            
            document.getElementById('collapseCount').textContent = gameState.collapseCount;
            document.getElementById('todayDate').textContent = formatDate();
            document.getElementById('ddayNumber').textContent = gameState.currentDay;
            document.getElementById('dayLabel').textContent = `D+${gameState.viewingDay}`;
            
            if (gameState.viewingDay === gameState.currentDay) {
                document.getElementById('completedCount').textContent = completed;
                document.getElementById('pendingCount').textContent = total - completed;
                document.getElementById('successRate').textContent = percent + '%';
            } else {
                document.getElementById('completedCount').textContent = total;
                document.getElementById('pendingCount').textContent = '0';
                document.getElementById('successRate').textContent = '100%';
            }
            
            document.getElementById('progressPercent').textContent = Math.round((gameState.viewingDay / gameState.maxHeight) * 100) + '%';
            document.getElementById('progressFill').style.width = (gameState.viewingDay / gameState.maxHeight * 100) + '%';
            
            document.getElementById('prevBtn').disabled = gameState.viewingDay === 0;
            document.getElementById('nextBtn').disabled = gameState.viewingDay === gameState.currentDay;
            
            updateCastleImage();
            
            const list = document.getElementById('participantsList');
            list.innerHTML = gameState.participants.map((p, idx) => `
                <div class="participant-card ${p.completed ? 'completed' : 'pending'} ${gameState.viewingDay !== gameState.currentDay ? 'disabled' : ''}" 
                     onclick="toggleParticipant(${idx})">
                    <div class="participant-name">${p.name}</div>
                    <div class="participant-status">${p.completed ? '✓ 완료' : '○ 대기'}</div>
                    ${p.completedTime ? `<div class="completed-time">${p.completedTime}</div>` : ''}
                </div>
            `).join('');
        }
        
        setInterval(() => checkAndResetDay(), 60000);
        
        document.getElementById('todayDate').textContent = formatDate();
        
        // 앱 시작 시 Google Sheets에서 데이터 로드
        loadGameData();
    </script>
</body>
</html>
