<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>21일 조건기도 모래성</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f3f0 0%, #f9f5f2 100%);
            color: #333;
        }
        
        .app-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem;
            min-height: 100vh;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 0.5rem 0;
        }
        
        .collapse-counter {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(239, 68, 68, 0.1);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #dc2626;
        }
        
        .today-date {
            text-align: center;
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }
        
        .dday {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(59, 130, 246, 0.1);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #1e40af;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin: 2rem 0;
        }
        
        .game-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .game-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
        }
        
        .nav-button {
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        
        .nav-button:hover:not(:disabled) {
            background: #dbeafe;
            border-color: #3b82f6;
            color: #1e40af;
            transform: scale(1.1);
        }
        
        .nav-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .game-canvas {
            background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 50%, #f4e4c1 100%);
            border-radius: 16px;
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .canvas-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .castle-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        
        .day-label {
            display: none;
        }
        
        .save-status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 11px;
            color: #666;
            background: rgba(255,255,255,0.8);
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .progress-section {
            margin: 0;
        }
        
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #fbbf24 0%, #f59e0b 100%);
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .right-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .prayer-section {
            background: #f9fafb;
            border-radius: 12px;
            padding: 1rem;
        }
        
        .prayer-title {
            font-size: 13px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 0.8rem;
        }
        
        .prayer-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .prayer-item {
            background: white;
            border: 0.5px solid #e5e7eb;
            border-radius: 6px;
            padding: 8px;
            font-size: 11px;
            line-height: 1.5;
            color: #666;
        }
        
        .prayer-item-title {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 2px;
            font-size: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .stat-card {
            background: #f9fafb;
            border-radius: 8px;
            padding: 0.8rem;
            text-align: center;
        }
        
        .stat-number {
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 2px;
        }
        
        .stat-label {
            font-size: 11px;
            color: #666;
            font-weight: 500;
        }
        
        .participants-section {
            background: #f9fafb;
            border-radius: 12px;
            padding: 1rem;
        }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 0.8rem;
        }
        
        .participants-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        
        .participant-card {
            background: white;
            border: 0.5px solid #e5e7eb;
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            user-select: none;
        }
        
        .participant-card:hover:not(.disabled) {
            transform: translateY(-2px);
            border-color: #bfdbfe;
            background: #f0f9ff;
        }
        
        .participant-card.completed {
            background: rgba(74, 222, 128, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
        }
        
        .participant-card.disabled {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .participant-name {
            font-size: 11px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 3px;
        }
        
        .participant-status {
            font-size: 9px;
            font-weight: 500;
        }
        
        .completed .participant-status {
            color: #22c55e;
        }
        
        .pending .participant-status {
            color: #666;
        }
        
        .completed-time {
            font-size: 8px;
            color: #16a34a;
            margin-top: 2px;
            font-weight: 600;
        }
        
        .notification {
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            animation: slideUp 0.4s ease;
            margin-top: 1rem;
        }
        
        .notification.success {
            background: rgba(74, 222, 128, 0.15);
            color: #16a34a;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        
        .notification.collapse {
            background: rgba(239, 68, 68, 0.15);
            color: #dc2626;
            border: 1px solid rgba(220, 38, 38, 0.3);
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 1000px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .participants-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="collapse-counter">
                <span>⚠️무너짐</span>
                <span id="collapseCount">0</span>
            </div>
            
            <div class="today-date" id="todayDate">
                2026년 3월 23일
            </div>
            
            <div class="dday">
                <span>D + <span id="ddayNumber">0</span></span>
            </div>
        </div>
        
        <div class="main-content">
            <div class="game-section">
                <div class="game-controls">
                    <button class="nav-button" id="prevBtn" onclick="previousDay()">←</button>
                    <div class="game-canvas">
                        <div class="canvas-content">
                            <img id="castleImage" 
                                 src="tower.png" 
                                 alt="모래성"
                                 class="castle-image"
                                 style="clip-path: inset(100% 0 0 0);">
                            <div class="day-label" id="dayLabel">D+0</div>
                            <div class="save-status" id="saveStatus">로딩중...</div>
                        </div>
                    </div>
                    <button class="nav-button" id="nextBtn" onclick="nextDay()" disabled>→</button>
                </div>
                
                <div class="progress-section">
                    <div class="progress-label">
                        <span id="progressTitle">모래성 완성도</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            
            <div class="right-section">
                <div class="prayer-section">
                    <div class="prayer-title">📿 기도제목</div>
                    <div class="prayer-list" id="prayerList"></div>
                </div>
                
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="completedCount">0</div>
                        <div class="stat-label">완료</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="pendingCount">12</div>
                        <div class="stat-label">진행중</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="successRate">0%</div>
                        <div class="stat-label">성공률</div>
                    </div>
                </div>
                
                <div class="participants-section">
                    <div class="section-title">오늘의 참가자</div>
                    <div class="participants-grid" id="participantsList"></div>
                </div>
            </div>
        </div>
        
        <div id="notificationArea"></div>
    </div>

    <script>
        // 🔑 Google Apps Script 배포 URL (기존과 동일)
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwl7tVNmdcPsKsR9fbGsW99VKxT-4znXQKAHTM2B5DHS2TrReFTZyB1vwsVUOjtzmCmTw/exec';

let gameState = {
    currentDay: 0,
    viewingDay: 0,
    castleHeight: 0,
    lastResetDate: new Date().toDateString(),
    participants: [
        { name: '정지양', completed: false, completedTime: null },
        { name: '이누리', completed: false, completedTime: null },
        { name: '이나영', completed: false, completedTime: null },
        { name: '김지윤', completed: false, completedTime: null },
        { name: '주손하나', completed: false, completedTime: null },
        { name: '김예람', completed: false, completedTime: null },
        { name: '김효진', completed: false, completedTime: null },
        { name: '이태령', completed: false, completedTime: null },
        { name: '최수아', completed: false, completedTime: null },
        { name: '진현주', completed: false, completedTime: null },
        { name: '최다영', completed: false, completedTime: null },
        { name: '성유나', completed: false, completedTime: null }
    ],
    collapseCount: 0,
    maxHeight: 21,
    castleHistory: [0]
};

// 기도제목 (기존과 동일)
const prayerByDays = {
    5: [ { num: 1, title: '선생님을 위한 기도', content: '6월 전까지 재판을 위해' }, { num: 2, title: '청미부서를 위한 기도', content: '팀원, 생명기도, 주의 뜻' }, { num: 3, title: '나의 사명과 차원', content: '사명과 차원을 높이기 위해' }, { num: 4, title: '감사, 회개 등', content: '감사와 회개의 기도' }, { num: 5, title: '특별 기도', content: '오늘의 기도 제목' } ],
    7: [ { num: 1, title: '선생님을 위한 기도', content: '6월 전까지 재판을 위해' }, { num: 2, title: '청미부서를 위한 기도', content: '팀원, 생명기도, 주의 뜻' }, { num: 3, title: '나의 사명과 차원', content: '사명과 차원을 높이기 위해' }, { num: 4, title: '가족을 위한 기도', content: '가족 모두의 신앙 성장' }, { num: 5, title: '감사, 회개 등', content: '감사와 회개의 기도' }, { num: 6, title: '지역사회를 위한 기도', content: '지역의 영적 부흥' }, { num: 7, title: '특별 기도', content: '오늘의 특별한 기도제목' } ],
    21: [ { num: 1, title: '선생님을 위한 기도', content: '6월 전까지 재판을 위해' }, { num: 2, title: '청미부서를 위한 기도', content: '팀원, 생명기도, 주의 뜻' }, { num: 3, title: '나의 사명과 차원', content: '사명과 차원을 높이기 위해' }, { num: 4, title: '감사, 회개 등', content: '감사와 회개의 기도' } ]
};

// 시간 포맷을 HH:MM으로 예쁘게 자르는 함수 (문제 4번 해결)
function formatCleanTime(timeVal) {
    if (!timeVal) return null;
    if (typeof timeVal === 'string' && /^\d{2}:\d{2}$/.test(timeVal)) return timeVal;
    try {
        const d = new Date(timeVal);
        if (!isNaN(d.getTime())) {
            return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        }
    } catch(e) {}
    return String(timeVal).substring(0, 5); 
}

function getCurrentTime() {
    const now = new Date();
    return `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
}

function formatDate() {
    const date = new Date();
    return `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일`;
}

function renderPrayerList() {
    const prayerList = document.getElementById('prayerList');
    const prayers = prayerByDays[gameState.maxHeight] || prayerByDays[21];
    prayerList.innerHTML = prayers.map(prayer => `
        <div class="prayer-item">
            <div class="prayer-item-title">${prayer.num}️⃣ ${prayer.title}</div>
            <div>${prayer.content}</div>
        </div>
    `).join('');
}

// 📥 데이터 불러오기 및 날짜 검증 (문제 2번, 3번 해결 핵심)
async function loadGameData() {
    try {
        updateSaveStatus('로딩중...');
        
        const gameRes = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getGame' }) });
        const gameData = await gameRes.json();
        
        if (gameData.currentDay !== undefined) {
            gameState.currentDay = Number(gameData.currentDay) || 0;
            gameState.collapseCount = Number(gameData.collapseCount) || 0;
            gameState.castleHistory = gameData.castleHistory || [0];
            // 구글 시트에서 마지막 접속일을 가져옵니다. 없으면 오늘로 세팅.
            gameState.lastResetDate = gameData.lastResetDate || new Date().toDateString(); 
            gameState.viewingDay = gameState.currentDay;
        }
        
        const partRes = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getParticipants' }) });
        const participants = await partRes.json();
        
        if (participants && participants.length > 0) {
            gameState.participants = gameState.participants.map(existing => {
                const loaded = participants.find(p => p.name === existing.name);
                if (loaded) {
                    return {
                        name: loaded.name,
                        completed: loaded.completed === true || loaded.completed === 'true',
                        completedTime: formatCleanTime(loaded.completedTime) // 더러운 시간 데이터를 깔끔하게 정리
                    };
                }
                return existing;
            });
        }
        
        updateSaveStatus('로드됨 ✓');
        
        // 🚨 핵심: 데이터를 다 불러온 후, 날짜가 바뀌었는지(자정 통과) 확인
        checkDateAndProcessReset(); 

    } catch(err) {
        console.log('데이터 로드 실패:', err);
        updateSaveStatus('오프라인');
        renderPrayerList();
        updateUI();
    }
}

// 자정(24시)을 넘겼는지 체크하는 함수 (타이머가 아닌 접속 시 체크 방식)
function checkDateAndProcessReset() {
    const todayStr = new Date().toDateString();
    
    // 마지막 저장된 날짜와 오늘 날짜가 다르다면 (하루가 지났다면)
    if (gameState.lastResetDate !== todayStr) {
        const allCompleted = gameState.participants.every(p => p.completed);
        
        if (allCompleted) {
            autoCompleteDay(); // 모두 했으면 D+1
        } else {
            autoCollapseDay(); // 한명이라도 안했으면 리셋
        }
        
        // 기준일을 오늘로 갱신
        gameState.lastResetDate = todayStr;
        saveGameData();
    } else {
        // 날짜가 안 바뀌었으면 그냥 UI만 그리기
        renderPrayerList();
        updateUI();
    }
}

async function saveGameData() {
    try {
        await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'saveGame',
                currentDay: gameState.currentDay,
                collapseCount: gameState.collapseCount,
                castleHistory: gameState.castleHistory,
                lastResetDate: gameState.lastResetDate // 접속일도 함께 저장
            })
        });
        updateSaveStatus('저장됨 ✓');
    } catch(err) {
        updateSaveStatus('저장 실패');
    }
}

async function saveParticipants() {
    try {
        const res = await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'saveParticipants', participants: gameState.participants })
        });
        const result = await res.json();
        if (result.status === 'ok') updateSaveStatus('저장됨 ✓');
        else updateSaveStatus('저장 실패');
    } catch(err) {
        updateSaveStatus('저장 실패');
    }
}

function updateSaveStatus(text) {
    const status = document.getElementById('saveStatus');
    if (status) status.textContent = text;
}

// 이전/다음 화살표 로직 수정 (문제 1번 해결)
function previousDay() {
    if (gameState.viewingDay > 0) {
        gameState.viewingDay--;
        updateUI();
    }
}

function nextDay() {
    if (gameState.viewingDay < gameState.currentDay) {
        gameState.viewingDay++;
        updateUI();
    }
}

function toggleParticipant(index) {
    if (gameState.viewingDay !== gameState.currentDay) return;
    
    const p = gameState.participants[index];
    if (!p.completed) {
        p.completed = true;
        p.completedTime = getCurrentTime();
        
        saveParticipants();
        updateUI();
        
        if (gameState.participants.every(p => p.completed)) {
            completeDay();
        }
    }
}

function autoCompleteDay() {
    if (gameState.currentDay < gameState.maxHeight) {
        gameState.currentDay++;
        gameState.viewingDay = gameState.currentDay;
        gameState.castleHeight = gameState.currentDay;
        gameState.castleHistory.push(gameState.currentDay);
        
        // 참가자 상태 초기화
        gameState.participants.forEach(p => { p.completed = false; p.completedTime = null; });
        
        showNotification(`🎉 성공! 모래성이 한층 높아졌습니다! (${gameState.currentDay}/${gameState.maxHeight})`, 'success');
        saveParticipants();
        updateUI();
    }
}

function autoCollapseDay() {
    gameState.collapseCount++;
    gameState.currentDay = 0;
    gameState.viewingDay = 0;
    gameState.castleHeight = 0;
    gameState.castleHistory = [0];
    
    // 참가자 상태 초기화
    gameState.participants.forEach(p => { p.completed = false; p.completedTime = null; });
    
    showNotification(`⚠️ 조건 미충족! 모래성이 무너졌습니다...<br/><span style="font-size: 12px;">D+0으로 리셋됩니다. 화이팅! 💪</span>`, 'collapse');
    saveParticipants();
    updateUI();
}

function completeDay() {
    showNotification(`✅ 오늘 12명 모두 완료했습니다!<br/><span style="font-size: 12px;">내일 접속 시 자동으로 성이 한 층 올라갑니다.</span>`, 'success');
}

function showNotification(message, type) {
    const notification = document.getElementById('notificationArea');
    notification.innerHTML = `<div class="notification ${type}">${message}</div>`;
    setTimeout(() => notification.innerHTML = '', 5000);
}

function updateCastleImage() {
    const castleImage = document.getElementById('castleImage');
    if (!castleImage) return;
    
    let displayHeight;
    if (gameState.viewingDay === gameState.currentDay) {
        const completed = gameState.participants.filter(p => p.completed).length;
        gameState.castleHeight = gameState.currentDay + (completed / gameState.participants.length);
        displayHeight = gameState.castleHeight;
    } else {
        displayHeight = gameState.castleHistory[gameState.viewingDay] || gameState.viewingDay;
    }
    
    const percentageToShow = (displayHeight / gameState.maxHeight) * 100;
    castleImage.style.clipPath = `inset(${100 - percentageToShow}% 0 0 0)`;
}

function updateUI() {
    const completed = gameState.participants.filter(p => p.completed).length;
    const total = gameState.participants.length;
    const percent = Math.round((completed / total) * 100);
    
    document.getElementById('collapseCount').textContent = gameState.collapseCount;
    document.getElementById('todayDate').textContent = formatDate();
    document.getElementById('ddayNumber').textContent = gameState.currentDay;
    document.getElementById('dayLabel').textContent = `D+${gameState.viewingDay}`;
    
    document.getElementById('progressTitle').textContent = `모래성 완성도 (${gameState.maxHeight}일)`;
    
    if (gameState.viewingDay === gameState.currentDay) {
        document.getElementById('completedCount').textContent = completed;
        document.getElementById('pendingCount').textContent = total - completed;
        document.getElementById('successRate').textContent = percent + '%';
    } else {
        // 과거 날짜를 볼 때
        document.getElementById('completedCount').textContent = total;
        document.getElementById('pendingCount').textContent = '0';
        document.getElementById('successRate').textContent = '100%';
    }
    
    document.getElementById('progressPercent').textContent = Math.round((gameState.viewingDay / gameState.maxHeight) * 100) + '%';
    document.getElementById('progressFill').style.width = (gameState.viewingDay / gameState.maxHeight * 100) + '%';
    
    // 왼쪽/오른쪽 버튼 활성화 조건 (복잡한 조건 제거하고 직관적으로 변경)
    document.getElementById('prevBtn').disabled = gameState.viewingDay <= 0;
    document.getElementById('nextBtn').disabled = gameState.viewingDay >= gameState.currentDay;
    
    updateCastleImage();
    
    const list = document.getElementById('participantsList');
    list.innerHTML = gameState.participants.map((p, idx) => `
        <div class="participant-card ${p.completed ? 'completed' : 'pending'} ${gameState.viewingDay !== gameState.currentDay ? 'disabled' : ''}" 
             onclick="toggleParticipant(${idx})">
            <div class="participant-name">${p.name}</div>
            <div class="participant-status">${p.completed ? '✓ 완료' : '○ 대기'}</div>
            ${p.completedTime ? `<div class="completed-time">${p.completedTime}</div>` : ''}
        </div>
    `).join('');
}
